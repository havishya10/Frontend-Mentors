<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>
<div class="decorator-bg-img">
</div>
<main>


  <article>
    <img class="header-img" src="images/illustration-hero.svg" alt="hero image">
    <div class="content-container">
    <h1>Order Summary</h1>
    <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
    <div class="plan-container">
      <div class="plan-type">
        <img class="icon-music" src="images/icon-music.svg" alt="music icon">
        <div class="plan-info">
          <h2>Annual Plan</h2>
          <p>$59.99/year</p>
        </div>
      </div>
      <a href="#" class="link">Change</a>
    </div>
    <button>Proceed to Payment</button>
    <a href="#" class="link">Cancel Order</a>
    </div>
  </article>
</main>
</body>
</html>
